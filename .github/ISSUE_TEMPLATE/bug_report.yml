name: "Bug Report"
description: "Report a bug — include environment, reproduction steps, and governance context"
title: "[BUG] "
labels: ["bug"]
body:
  - type: dropdown
    id: organ
    attributes:
      label: "Organ"
      description: "Which organ does this bug affect?"
      options:
        - "ORGAN-I (Theoria)"
        - "ORGAN-II (Poiesis)"
        - "ORGAN-III (Ergon)"
        - "ORGAN-IV (Taxis)"
        - "ORGAN-V (Logos)"
        - "ORGAN-VI (Koinonia)"
        - "ORGAN-VII (Kerygma)"
        - "META-ORGANVM"
        - "Cross-organ / Unknown"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "Bug Description"
      description: "What happened? What did you expect to happen?"
      placeholder: "When I run X, I expected Y but got Z instead."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: "Steps to Reproduce"
      description: "Minimal steps to trigger the bug."
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: "Environment"
      description: "OS, runtime, relevant versions."
      placeholder: "macOS 26, Python 3.12, Node 25"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: "Error Output / Logs"
      description: "Paste error messages, stack traces, or screenshots."
      render: shell
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: "Acceptance Criteria"
      description: "How will we know the bug is fixed? List 1-3 testable criteria."
      placeholder: |
        - [ ] Command X completes without error
        - [ ] Output matches expected format
    validations:
      required: false

  - type: checkboxes
    id: governance
    attributes:
      label: "Governance Gates"
      description: "Check any that apply to the fix."
      options:
        - label: "Fix requires registry.json update"
        - label: "Fix touches cross-organ dependencies"
        - label: "Fix changes CI/CD workflows"
        - label: "Fix modifies governance rules or promotion logic"
