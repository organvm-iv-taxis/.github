name: "Feature Request"
description: "Propose a new feature or enhancement with governance context"
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: dropdown
    id: organ
    attributes:
      label: "Organ"
      description: "Which organ does this feature belong to?"
      options:
        - "ORGAN-I (Theoria)"
        - "ORGAN-II (Poiesis)"
        - "ORGAN-III (Ergon)"
        - "ORGAN-IV (Taxis)"
        - "ORGAN-V (Logos)"
        - "ORGAN-VI (Koinonia)"
        - "ORGAN-VII (Kerygma)"
        - "META-ORGANVM"
        - "Cross-organ"
    validations:
      required: true

  - type: textarea
    id: outcome
    attributes:
      label: "Desired Outcome"
      description: "What should be true after this feature ships? Focus on the 'what', not the 'how'."
      placeholder: "Users can X, which enables Y."
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: "Problem Statement"
      description: "What limitation or gap does this address?"
      placeholder: "Currently, there is no way to..."
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: "Acceptance Criteria"
      description: "3-7 testable criteria. A different person should be able to verify each one."
      value: |
        - [ ]
        - [ ]
        - [ ]
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives Considered"
      description: "What other approaches were evaluated? Why were they rejected?"
    validations:
      required: false

  - type: dropdown
    id: tier
    attributes:
      label: "Repo Tier"
      description: "What tier is the target repo?"
      options:
        - "Flagship"
        - "Standard"
        - "Infrastructure"
        - "Stub"
        - "Unknown"
    validations:
      required: false

  - type: checkboxes
    id: governance
    attributes:
      label: "Governance Gates"
      description: "Check all that apply. These determine review requirements."
      options:
        - label: "Requires registry.json update"
        - label: "Introduces cross-organ dependencies"
        - label: "Changes CI/CD workflows"
        - label: "Modifies governance rules or promotion logic"
        - label: "Affects data classification (Public/Internal/Confidential/Regulated)"
        - label: "Requires seed.yaml update"

  - type: textarea
    id: context
    attributes:
      label: "Additional Context"
      description: "Mockups, related issues, research document references (DOC-IDs, F-IDs)."
    validations:
      required: false
